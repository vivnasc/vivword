<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>VivWord</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="taskpane.css" />
</head>
<body>
  <div id="app" aria-busy="false">

    <header class="toolbar" role="toolbar" aria-label="Acções no documento">
      <button type="button" class="tool" data-action="read-selection" title="Ler texto seleccionado">Ler</button>
      <button type="button" class="tool" data-action="read-document" title="Ler documento todo">Doc</button>
      <button type="button" class="tool" data-action="comment" title="Inserir última resposta como comentário na margem" hidden>Comentar</button>
      <button type="button" class="tool" data-action="insert" title="Inserir última resposta no cursor">Inserir</button>
      <button type="button" class="tool" data-action="replace" title="Substituir selecção pela última resposta">Subst.</button>
    </header>

    <nav class="skills" id="skills" aria-label="Skills literárias"></nav>

    <section class="system-block">
      <button type="button" id="sysToggle" class="sys-toggle" aria-expanded="false" aria-controls="sysPrompt">
        <span class="chev" aria-hidden="true">▸</span> Instrução para o Claude
      </button>
      <div class="sys-body" hidden>
        <textarea id="sysPrompt" class="sys-prompt" rows="3" placeholder="A carregar instrução padrão…"></textarea>
        <button type="button" id="sysReset" class="link-btn sys-reset" hidden>Repor instrução padrão</button>
      </div>
    </section>

    <section class="system-block voice-block">
      <button type="button" id="voiceToggle" class="sys-toggle" aria-expanded="false" aria-controls="voiceFingerprint">
        <span class="chev" aria-hidden="true">▸</span> Voz da casa
        <span class="hint">— guardada por documento</span>
      </button>
      <div class="sys-body" hidden>
        <p class="micro">Cola aqui um a três parágrafos teus que reconheces como inquestionavelmente da tua voz. Vão como referência calibradora em cada chamada.</p>
        <textarea id="voiceFingerprint" class="sys-prompt" rows="5" placeholder="Cola aqui parágrafos âncora desta obra…"></textarea>
        <span id="voiceStatus" class="micro" aria-live="polite"></span>
      </div>
    </section>

    <section id="contextChip" class="context-chip" hidden>
      <span id="contextLabel"></span>
      <button type="button" id="contextClear" aria-label="Remover contexto">×</button>
    </section>

    <main id="chat" class="chat" aria-live="polite" aria-label="Conversa com Claude">
      <div class="empty-hint">
        <p>Olá. Pergunta algo, usa os botões para passar texto do documento, ou toca uma <em>skill</em>.</p>
      </div>
    </main>

    <div id="loading" class="loading" hidden>
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>

    <form id="composer" class="composer" autocomplete="off">
      <textarea
        id="input"
        rows="2"
        placeholder="Escreve aqui…"
        aria-label="Mensagem"
      ></textarea>
      <button type="submit" id="sendBtn" class="send" aria-label="Enviar">Enviar</button>
    </form>

    <footer class="footer">
      <div class="footer-row">
        <label class="model-select">
          Modelo
          <select id="model">
            <option value="claude-opus-4-5" selected>Opus 4.5</option>
            <option value="claude-sonnet-4-5">Sonnet 4.5</option>
          </select>
        </label>
        <button type="button" id="exportChat" class="link-btn" title="Copiar conversa como Markdown">Exportar</button>
        <button type="button" id="clearChat" class="link-btn" title="Limpar conversa deste documento">Limpar</button>
      </div>
    </footer>

  </div>

  <script src="taskpane.js"></script>
</body>
</html>
